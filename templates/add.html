{% extends "base.html" %}
{% block content %}

<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Add Expense</h2>
    <p class="text-gray-500 mt-1">Log a new transaction</p>
</div>

<div class="bg-white rounded-2xl shadow-sm p-6">
    <form method="POST" action="{{ url_for('add') }}" class="space-y-4">

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Amount (₹)</label>
            <input type="number" name="amount" step="0.01" min="0" required
                   placeholder="0.00"
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-indigo-500">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
            <select name="category" required
                    class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-indigo-500">
                <option value="">Select category</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Health</option>
                <option>Entertainment</option>
                <option>Bills</option>
                <option>Education</option>
                <option>Other</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Note (optional)</label>
            <input type="text" name="note"
                   placeholder="What was this for?"
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-indigo-500">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Date</label>
            <input type="date" name="date" required
                   class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-indigo-500">
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-all">
            Save Expense
        </button>

    </form>
</div>

{% endblock %}
