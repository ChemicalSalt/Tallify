<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tallify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f7f7f9; min-height: 100vh; }
        nav { background: #fff; border-bottom: 1px solid #ebebef; position: sticky; top: 0; z-index: 50; }
        .nav-inner {
            max-width: 680px; margin: 0 auto;
            padding: 0 16px; height: 52px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand {
            font-size: 17px; font-weight: 800; color: #0f0f12;
            text-decoration: none; letter-spacing: -0.4px;
        }
        .nav-links { display: flex; align-items: center; gap: 2px; }
        .nav-link {
            padding: 6px 12px; border-radius: 8px;
            font-size: 13px; font-weight: 500; color: #888;
            text-decoration: none; transition: background 0.1s, color 0.1s;
        }
        .nav-link:hover { background: #f5f5f7; color: #0f0f12; }
        .nav-link.active { background: #f0f0f5; color: #0f0f12; font-weight: 600; }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .nav-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            object-fit: cover; border: 1.5px solid #e5e5ea;
        }
        .nav-signout {
            font-size: 12px; font-weight: 500; color: #bbb;
            text-decoration: none; padding: 5px 8px;
            border-radius: 7px; transition: color 0.1s, background 0.1s;
        }
        .nav-signout:hover { color: #ef4444; background: #fff0f0; }
        .nav-signin {
            font-size: 13px; font-weight: 600; color: #fff;
            background: #0f0f12; padding: 7px 14px;
            border-radius: 9px; text-decoration: none;
            transition: background 0.12s;
        }
        .nav-signin:hover { background: #2a2a35; }
        main { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{{ url_for('budget') }}" class="nav-brand">Tallify</a>

            {% if session.get('user') %}
            <div class="nav-links">
                <a href="{{ url_for('budget') }}"
                   class="nav-link {% if request.endpoint == 'budget' %}active{% endif %}">Budget</a>
                <a href="{{ url_for('expenses') }}"
                   class="nav-link {% if request.endpoint == 'expenses' %}active{% endif %}">Expenses</a>
                <a href="{{ url_for('stats') }}"
                   class="nav-link {% if request.endpoint == 'stats' %}active{% endif %}">Stats</a>
            </div>
            <div class="nav-right">
                {% if session['user'].get('picture') %}
                <img src="{{ session['user']['picture'] }}" alt="" class="nav-avatar">
                {% endif %}
                <a href="{{ url_for('logout') }}" class="nav-signout">Sign out</a>
            </div>
            {% else %}
            <a href="{{ url_for('google_login') }}" class="nav-signin">Sign in</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
