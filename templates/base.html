<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold text-indigo-600">💰 Tally</a>
            <div class="flex gap-4 items-center">
                <a href="{{ url_for('index') }}" class="text-gray-500 hover:text-indigo-600 font-medium text-sm">Dashboard</a>
                <a href="{{ url_for('add') }}" class="text-gray-500 hover:text-indigo-600 font-medium text-sm">Add</a>
                <a href="{{ url_for('stats') }}" class="text-gray-500 hover:text-indigo-600 font-medium text-sm">Stats</a>
                <a href="{{ url_for('logout') }}" class="text-gray-500 hover:text-indigo-600 font-medium text-sm">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
